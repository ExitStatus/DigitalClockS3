; User-tunable settings, referenced from platformio.ini via ${settings.*}.
; Unlike secrets.ini, this file is committed: the values here are shared
; defaults, not credentials. Edit them to taste and rebuild.
;
; These are compile-time settings. Every token below is validated in
; include/Config.h, so a misspelt value fails the build rather than quietly
; falling back to a default.
[settings]
; ---- Clock ----------------------------------------------------------------
; 12-hour shows an AM/PM superscript beside the time; 24-hour zero-pads the
; hour and drops the superscript.

time_format = 12                   ; 12 | 24

; Blink the ":" between the hours and minutes once a second. Off leaves it lit
; permanently. Blinking repaints the clock page every second rather than once a
; minute.
blink_colon = on                   ; on | off

; Colours of the seven-segment digits, as RRGGBB hex -- no leading "#" or "0x".
; Every segment is drawn every time: lit ones in the active colour, unlit ones
; in the inactive colour, which is what gives the digits their "ghost" outline.
; Setting the inactive colour to 000000 hides the ghosting entirely.
;
; The display is 16-bit, so each channel is quantised on the way to the panel
; (red and blue to 5 bits, green to 6). Colours close together in hex can end up
; identical on screen.
segment_active_colour   = F02828   ; lit segments
segment_inactive_colour = 0A0A0A   ; unlit segments

; ---- Units ----------------------------------------------------------------
; Each quantity picks its own unit, so mixed conventions (the UK's Celsius +
; mph + millibars) are expressible.

; Which reading drives the temperature: the measured air temperature (temp) or
; the apparent "feels like" temperature (feelslike).
weather_temp_field = feelslike     ; temp | feelslike

temperature_unit   = c             ; c | f
wind_unit          = mph           ; mph | kph
pressure_unit      = mb            ; mb | inhg

; ---- Graph pages ----------------------------------------------------------
; The clock is always page one. Each graph enabled here is added to the cycle
; the bottom-right button steps through; disabled graphs are compiled out
; entirely, so turning one off also reclaims its flash.

graph_temperature = on             ; on | off
graph_pressure    = on             ; on | off
graph_wind        = on             ; on | off
graph_rain        = on             ; on | off
graph_snow        = on             ; on | off

; Seconds to stay on a graph page before it returns to the clock on its own.
; Each press of the page button restarts the countdown. 0 disables the
; auto-return, leaving the graph up until you press the button again.
graph_timeout_seconds = 30

; ---- Forecast stats -------------------------------------------------------
; The stats that fade in and out along the bottom of the clock page. Each one
; enabled here joins the rotation; turn them all off to leave the bottom line
; to the temperature and wind alone.

forecast_stat_max_temp = on        ; on | off  -- "Max 21/23 C"
forecast_stat_rain     = on        ; on | off  -- "Rain 40/10 %"
forecast_stat_wind     = on        ; on | off  -- "Wind 12/18 mph"

; Fade in/out duration and hold duration for each stat, in milliseconds.
forecast_fade_ms   = 1000
forecast_hold_ms   = 8000

; ---- News headlines -------------------------------------------------------
; Headlines are read from Google News' RSS feed for one country. While there
; are unseen headlines the clock digits shrink to open a band beneath them and
; each headline scrolls through it; once the queue drains the digits grow back.
; The weather line along the bottom is never disturbed.
;
; Only headlines published since the last one you saw are shown. That watermark
; survives a reboot, so you never see the same headline twice.

news = on                          ; on | off

; ISO 3166-1 alpha-2 country code, e.g. GB, US, AU, IE. The feed is always
; requested in English, so a country that does not publish an English edition
; will give thin results.
news_country = GB

; How often to check for new headlines. The first check is deliberately delayed
; (see NewsApi) so the time and weather paint first on a cold boot.
news_interval_minutes = 30

; Ticker scroll speed in pixels per second. This sets the reading pace, not the
; time on screen: a long headline simply takes longer to cross. At 60 a typical
; headline is visible for about 14 seconds.
news_display_speed = 60

; How many unseen headlines to show per check. Also caps the very first run,
; where every item in the feed is unseen and would otherwise queue up.
news_max_items = 5
