; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Pull in local credentials/location from secrets.ini (gitignored). Copy
; secrets.ini.example to secrets.ini and fill in your own values.
; settings.ini holds the non-secret, user-tunable settings and is committed.
extra_configs =
	secrets.ini
	settings.ini

[env]
platform = espressif32
platform_packages = tool-esptoolpy@1.40300
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200

; TFT_eSPI configuration for the LilyGo T-Display-S3 (ST7789, 8-bit parallel).
; Equivalent to Setup206_LilyGo_T_Display_S3.h, but defined here so it can't be
; lost when the library is reinstalled. USER_SETUP_LOADED tells TFT_eSPI to use
; these flags instead of User_Setup_Select.h.
build_flags =
	; Make project headers in include/ (e.g. Debug.h) visible to lib/ libraries too
	-I include
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DCGRAM_OFFSET=1
	-DTFT_RGB_ORDER=TFT_BGR
	-DTFT_INVERSION_ON=1
	-DTFT_PARALLEL_8_BIT=1
	-DTFT_WIDTH=170
	-DTFT_HEIGHT=320
	-DTFT_DC=7
	-DTFT_RST=5
	-DTFT_WR=8
	-DTFT_RD=9
	-DTFT_D0=39
	-DTFT_D1=40
	-DTFT_D2=41
	-DTFT_D3=42
	-DTFT_D4=45
	-DTFT_D5=46
	-DTFT_D6=47
	-DTFT_D7=48
	-DTFT_BL=38
	-DTFT_BACKLIGHT_ON=HIGH
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	-DLOAD_FONT6=1
	-DLOAD_FONT7=1
	-DLOAD_FONT8=1
	-DLOAD_GFXFF=1
	-DSMOOTH_FONT=1
	; WiFi credentials + WeatherAPI key + location come from secrets.ini
	; (see the [secrets] section there / in secrets.ini.example).
	-D WIFI_SSID=\"${secrets.wifi_ssid}\"
	-D WIFI_PASSWORD=\"${secrets.wifi_password}\"
	; WeatherAPI: API key + fixed location (lat/lon) queried directly.
	-D WEATHER_API_KEY=\"${secrets.weather_api_key}\"
	-D LOCATION_LAT=${secrets.location_lat}
	-D LOCATION_LON=${secrets.location_lon}
	; User-tunable settings come from settings.ini (see the [settings] section).
	; The unit/switch tokens are pasted onto a prefix here and resolved into
	; compile-time constants by include/Config.h, which also validates them.
	-D TIME_FORMAT=FMT_${settings.time_format}
	-D BLINK_COLON=SW_${settings.blink_colon}
	; RRGGBB hex from settings.ini, given the 0x here rather than in the file.
	-D SEGMENT_ACTIVE_RGB=0x${settings.segment_active_colour}
	-D SEGMENT_INACTIVE_RGB=0x${settings.segment_inactive_colour}
	-D WEATHER_TEMP_FIELD_BASE=\"${settings.weather_temp_field}\"
	-D TEMPERATURE_UNIT=UNIT_${settings.temperature_unit}
	-D WIND_UNIT=UNIT_${settings.wind_unit}
	-D PRESSURE_UNIT=UNIT_${settings.pressure_unit}
	-D GRAPH_TEMPERATURE=SW_${settings.graph_temperature}
	-D GRAPH_PRESSURE=SW_${settings.graph_pressure}
	-D GRAPH_WIND=SW_${settings.graph_wind}
	-D GRAPH_RAIN=SW_${settings.graph_rain}
	-D GRAPH_SNOW=SW_${settings.graph_snow}
	-D FORECAST_STAT_MAX_TEMP=SW_${settings.forecast_stat_max_temp}
	-D FORECAST_STAT_RAIN=SW_${settings.forecast_stat_rain}
	-D FORECAST_STAT_WIND=SW_${settings.forecast_stat_wind}
	-D FORECAST_FADE_MS=${settings.forecast_fade_ms}
	-D FORECAST_HOLD_MS=${settings.forecast_hold_ms}
	-D NEWS=SW_${settings.news}
	-D NEWS_COUNTRY=\"${settings.news_country}\"
	-D NEWS_INTERVAL_MINUTES=${settings.news_interval_minutes}
	-D NEWS_DISPLAY_SPEED=${settings.news_display_speed}
	-D NEWS_MAX_ITEMS=${settings.news_max_items}
lib_deps =
	SPI
	mathertel/OneButton@^2.0.3
	bitbank2/PNGdec@^1.0.1
	bblanchon/ArduinoJson@^6.21.1
    TFT_eSPI
