[env:DEBUG]
build_type = debug
build_flags =
	${env.build_flags}
	-D DEBUG
	-DCORE_DEBUG_LEVEL=5
	-DDISABLE_ALL_LIBRARY_WARNINGS=1
	-Wno-unused-variable

[env:RELEASE]
build_type = release
build_flags =
	${env.build_flags}
	-DDISABLE_ALL_LIBRARY_WARNINGS=1
	-Wno-unused-variable